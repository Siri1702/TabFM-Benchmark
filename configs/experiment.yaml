experiment:
  name: "tabpfn-vs-world-v1"
  n_seeds: 10          # run each dataset × model × seed
  cv_strategy: "stratified_kfold"
  n_folds: 5
  test_size: 0.2       # outer holdout split
  timeout_per_run: 300  # seconds; skip if exceeded
  
  tabpfn_max_rows: 3000  # TabPFN v2 practical limit for CPU
  tabpfn_max_features: 100

  metrics:
    - roc_auc
    - average_precision
    - f1_macro
    - brier_score
    - log_loss

  timing:
    - fit_time_seconds
    - predict_time_seconds
    - total_time_seconds
    - optuna_tuning_time_sec     
    - total_wall_time_sec        
    - throughput_rows_per_sec

  timing_note: >
    For TabPFN, optuna_tuning_time_sec = 0 always.
    total_wall_time_sec is the apples-to-apples comparison:
    it captures the full cost a practitioner actually pays.